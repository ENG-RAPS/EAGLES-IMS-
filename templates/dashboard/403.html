{% extends 'partials/base.html' %}
{% load static %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="fas fa-lock text-danger" style="font-size: 5rem;"></i>
        </div>
        <h1 class="display-4 fw-bold text-danger">403</h1>
        <h2 class="mb-3">Access Denied</h2>
        <p class="lead mb-4">You do not have permission to view this page.</p>
        <p class="text-muted">If you believe this is a mistake, please contact your system administrator.</p>
        <a href="{% url 'dashboard-index' %}" class="btn btn-primary btn-lg mt-3">
            <i class="fas fa-home"></i> Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
