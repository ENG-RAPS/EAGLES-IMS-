{% extends 'partials/base.html' %}

{% block title %}Delete Department{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h4><i class="fas fa-exclamation-triangle"></i> Confirm Deletion</h4>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete department <strong>{{ department.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Confirm Delete</button>
                <a href="{% url 'user:department_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
