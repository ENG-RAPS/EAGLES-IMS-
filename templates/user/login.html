{% extends 'partials/auth_base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Eagle IMS{% endblock %}

{% block auth_content %}
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary mt-2">
        <i class="fas fa-sign-in-alt"></i> Log In
    </button>
</form>
<div class="auth-links mt-3">
    <a href="{% url 'user:password-reset' %}">Forgot Password?</a>
    <span class="mx-2">|</span>
    <a href="{% url 'user:register' %}">Create Account</a>
</div>
{% endblock %}
