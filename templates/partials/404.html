{% extends 'partials/auth_base.html' %}
{% load static %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="fas fa-search text-muted" style="font-size: 5rem;"></i>
        </div>
        <h1 class="display-4 fw-bold text-muted">404</h1>
        <h2 class="mb-3">Page Not Found</h2>
        <p class="lead mb-4">The page you are looking for does not exist or has been moved.</p>
        <p class="text-muted">Please check the URL or go back to the <a href="{% url 'dashboard-index' %}">Dashboard</a>.</p>
        <a href="{% url 'dashboard-index' %}" class="btn btn-primary btn-lg mt-3">
            <i class="fas fa-home"></i> Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
