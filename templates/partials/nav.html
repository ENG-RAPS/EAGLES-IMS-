<div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
        {% if user.is_authenticated %}
        <li class="nav-item">
            <span class="navbar-text text-white mr-3">
                <i class="fas fa-user"></i> {{ user.username }}
            </span>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="{% url 'user:profile' %}">
                <i class="fas fa-user-cog"></i> Profile
            </a>
        </li>
        <li class="nav-item">
            <form method="post" action="{% url 'user:logout' %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-link nav-link text-white" style="display: inline; padding: 0; border: none; background: none; text-decoration: none; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </li>
        {% else %}
        <li class="nav-item">
            <a class="nav-link text-white" href="{% url 'user:login' %}">Login</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="{% url 'user:register' %}">Register</a>
        </li>
        {% endif %}
    </ul>
</div>
