{% extends 'partials/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-clipboard-list"></i> {{ title }}</h4>
                </div>
                <div class="card-body">
                    <form method="post" novalidate>
                        {% csrf_token %}

                        <!-- Equipment Selection -->
                        <div class="form-row">
                            <div class="col-md-12">
                                {{ form.equipment|as_crispy_field }}
                            </div>
                        </div>

                        <!-- Condition -->
                        <div class="form-row">
                            <div class="col-md-12">
                                {{ form.condition|as_crispy_field }}
                            </div>
                        </div>

                        <!-- Remarks -->
                        <div class="form-row">
                            <div class="col-md-12">
                                {{ form.remarks|as_crispy_field }}
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="form-row mt-3">
                            <div class="col-12">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save"></i> Save
                                </button>
                                <a href="{% url 'biomed:stocktake_list' %}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
