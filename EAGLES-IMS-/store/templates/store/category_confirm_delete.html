{% extends 'partials/base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4>Confirm Delete</h4>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete <strong>"{{ category.name }}"</strong>?</p>
                    <p class="text-muted">Products using this category will have their category set to NULL.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, delete</button>
                        <a href="{% url 'store:category_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
